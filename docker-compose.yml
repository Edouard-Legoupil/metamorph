version: '3.9'

x-common-env: &common-env
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  PGVECTOR_ENABLED: 'true'
  REDIS_URL: redis://redis:6379/0
  BACKEND_URL: http://backend:8000
  FRONTEND_URL: http://frontend:3000
  LITELLM_PROXY_URL: http://litellm:4000
  WIKIJS_URL: http://wikijs:3000
  WIKIJS_API_KEY: ${WIKIJS_API_KEY}
  SECRET_KEY: ${SECRET_KEY}
  CORS_ORIGINS: '["http://localhost:3000"]'
  S3_ENDPOINT: http://minio:9000
  S3_ACCESS_KEY: ${S3_ACCESS_KEY}
  S3_SECRET_KEY: ${S3_SECRET_KEY}
  S3_BUCKET: ${S3_BUCKET}
  STORAGE_PROVIDER: s3

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      LITELLM_PROXY_URL: http://litellm:4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      litellm-proxy:
        condition: service_healthy
    ports:
      - '8000:8000'
    volumes:
      - ./uploads:/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 20s
      timeout: 10s
      retries: 3

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.worker.tasks worker --loglevel=info
    env_file: .env
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - backend
      - redis
      - postgres
    volumes:
      - ./uploads:/uploads
    healthcheck:
      test: ["CMD", "celery", "-A", "app.worker.tasks", "status"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      <<: *common-env
      VITE_BACKEND_URL: http://localhost:8000
      VITE_WIKIJS_URL: http://wikijs:3000
    depends_on:
      backend:
        condition: service_healthy
      wikijs:
        condition: service_healthy
    ports:
      - '3000:3000'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 20s
      timeout: 10s
      retries: 3

  postgres:
    image: ankane/pgvector:0.5.1
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', '${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  wikijs:
    image: requarks/wiki:2
    restart: always
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      WIKI_USERNAME: admin@wikijs.local
      WIKI_PASSWORD: ${WIKIJS_ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - wikijs_data:/wiki/data
    ports:
      - '4100:3000'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 20s
      timeout: 10s
      retries: 3

  litellm-proxy:
    image: litellm/litellm:latest
    restart: always
    environment:
      LITELLM_PROXY_PORT: "4000"
      LITELLM_MODEL_PREFERENCE: gpt-4,claude-3,ollama/llama3
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
    ports:
      - '4000:4000'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 20s
      timeout: 10s
      retries: 3

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 20s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:1.25
    restart: always
    depends_on:
      - frontend
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pg_data:
  redis_data:
  wikijs_data:
  minio_data:
  uploads:

networks:
  default:
    driver: bridge
