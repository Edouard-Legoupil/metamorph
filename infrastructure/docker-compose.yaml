version: '3.9'
services:
  app:
    build:
      context: ..
      dockerfile: ./backend/Dockerfile
    environment:
      # Backend + MCP keys, MinIO keys, and any required .env for src/ingestion
      MCP_API_KEY: ${MCP_API_KEY}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      FASTAPI_INGEST_URL: http://app:8000/ingest
      FRONTEND_BUILD_DIR: /app/frontend_dist
    ports:
      - "8000:8000"
    depends_on:
      - minio
      - postgres

  minio:
    image: "minio/minio:latest"
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
    volumes:
      - minio_data:/data

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: metamorph
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  minio_data:
  pg_data:
