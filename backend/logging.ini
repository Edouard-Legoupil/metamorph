[loggers]
keys=root

[handlers]
keys=consoleHandler,fileHandler

[formatters]
keys=stdFormatter

[logger_root]
level=INFO
handlers=consoleHandler,fileHandler

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=stdFormatter
args=(sys.stdout,)

[handler_fileHandler]
class=FileHandler
level=INFO
formatter=stdFormatter
args=('metamorph.log', 'a')

[formatter_stdFormatter]
format=%(asctime)s %(levelname)s %(name)s: %(message)s
