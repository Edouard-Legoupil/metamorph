[pytest]
# Test configuration for Metamorph backend

# Directories to search for tests
testpaths = tests

# Python paths
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Verbosity and output
addopts = --verbose --tb=short --color=yes

# Timeout for slow tests
timeout = 30

# Markers for different test types
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks integration tests
    contract: marks contract tests
    e2e: marks end-to-end tests
    unit: marks unit tests (default)

# Coverage configuration
[pytest-cov]
# Regular coverage
regular = True

# Minimum coverage percentage (can be overridden with --cov-fail-under)
fail_under = 80

# Coverage reporting
report =
    term
    html

# Files to include in coverage
source =
    app

# Files to omit from coverage
omit =
    app/main.py
    app/__init__.py
    */tests/*
    */migrations/*
    */config.py

# Parallel testing
[xdist]
enabled = True

# Test result logging
log_cli = True
log_cli_level = INFO
log_file = test-results/pytest.log
log_file_level = DEBUG

# JUnit XML reporting
junit_family = xunit2
junit_logging = all

# Async test support
asyncio_mode = auto
